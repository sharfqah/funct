<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Javascript Arrow Function</h2>

    <p> This is example shows an Arrow Function with a parameter.</p>

    <p id="result"></p>
    <p id="result2"></p>
    <p id="result3"></p>
        
    <script>
        const add = (a,b) => a + b;

        document.getElementById("result").innerHTML = add(4,6);

        const sub = (a,b) => a - b;

        document.getElementById("result2").innerHTML = sub (7,6);
        
        const mul = (a,b) => a * b;

        document.getElementById("result3").innerHTML = mul (5,4);


    </script>
</body>
</html>
